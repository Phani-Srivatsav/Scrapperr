<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glaido — AI Newsletter Feed</title>
  <meta name="description" content="A premium aggregator of the latest AI newsletters and articles from Ben's Bites and The AI Rundown, updated every 24 hours." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="index.css" />
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════

    </div>

    <nav id="sidebar-nav">
      <button class="nav-btn active" id="nav-all" data-filter="all">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        <span class="nav-label">All Articles</span>
        <span class="nav-count" id="count-all">0</span>
      </button>
      <button class="nav-btn" id="nav-saved" data-filter="saved">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" rx="1"/></svg>
        </span>
        <span class="nav-label">Saved</span>
        <span class="nav-count" id="count-saved">0</span>
      </button>
    </nav>

    <div id="sidebar-sources">
      <p class="sidebar-section-label">SOURCES</p>
      <div class="source-group">
        <button class="source-item active" id="src-all" data-source="all">
          <span class="source-dot dot-all"></span>
          All Sources
        </button>
        <button class="source-item" id="src-bens" data-source="Ben's Bites">
          <span class="source-dot dot-bens"></span>
          Ben's Bites
          <span class="source-count" id="count-bens">0</span>
        </button>
        <button class="source-item" id="src-rundown" data-source="The AI Rundown">
          <span class="source-dot dot-rundown"></span>
          The AI Rundown
          <span class="source-count" id="count-rundown">0</span>
        </button>
      </div>
    </div>

    <!-- Platform Pulse Stats -->
    <div id="sidebar-pulse">
      <p class="sidebar-section-label">PLATFORM PULSE</p>
      <div id="pulse-chart-container">
        <canvas id="pulse-chart"></canvas>
      </div>
    </div>

    <div id="sidebar-footer">
      <p id="footer-brand">GLAIDO v1.0</p>
      <span id="last-updated-label">—</span>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN FEED
  ════════════════════════════════════════════ -->
  <main id="main">
    <header id="feed-header">
      <div id="feed-title-row">
        <h1 id="feed-heading">Today's Feed</h1>
        <div id="feed-meta">
          <span id="feed-date" class="mono">—</span>
          <button id="refresh-btn" title="Refresh feed">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </div>
      </div>

      <!-- Stale data warning banner -->
      <div id="stale-banner" class="hidden">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Showing cached data. Run <code>python tools/scraper.py</code> to refresh.
      </div>
    </header>

    <!-- Article Feed -->
    <section id="feed" role="list" aria-label="Article feed">
      <!-- Skeleton loading state (shown on initial load) -->
      <div class="skeleton-card" aria-hidden="true"><div class="sk-tag"></div><div class="sk-title"></div><div class="sk-title sk-short"></div><div class="sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="sk-tag"></div><div class="sk-title"></div><div class="sk-title sk-short"></div><div class="sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="sk-tag"></div><div class="sk-title"></div><div class="sk-title sk-short"></div><div class="sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="sk-tag"></div><div class="sk-title"></div><div class="sk-title sk-short"></div><div class="sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="sk-tag"></div><div class="sk-title"></div><div class="sk-title sk-short"></div><div class="sk-meta"></div></div>
    </section>

    <!-- Empty state -->
    <div id="empty-state" class="hidden">
      <div id="empty-inner">
        <span id="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </span>
        <p id="empty-title">No articles found</p>
        <p id="empty-sub">Run the scraper to populate the feed.</p>
        <code id="empty-cmd">python tools/scraper.py</code>
      </div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden">
      <div id="error-inner">
        <span id="error-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#BFF549" stroke-width="1.5"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </span>
        <p id="error-title">Schema Mismatch</p>
        <p id="error-sub" class="mono"></p>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       DETAIL PANEL
  ════════════════════════════════════════════ -->
  <aside id="detail-panel" class="fullscreen-overlay" aria-hidden="true">
    <div id="detail-container">
      <div id="detail-header">
        <button id="detail-close" aria-label="Close article">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="detail-scroller">
        <div id="detail-content-wrap">
          <div id="detail-image-container"></div>
          <div id="detail-meta-row">
            <span id="detail-source-tag"></span>
            <p id="detail-timestamp" class="mono"></p>
          </div>
          <h2 id="detail-title"></h2>
          <div id="detail-divider"></div>
          <p id="detail-summary"></p>
          <div id="detail-actions">
            <a id="detail-link" href="#" target="_blank" rel="noopener noreferrer">
              Read Full Article
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
            <button id="detail-save-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Panel overlay (mobile) -->
  <div id="panel-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
